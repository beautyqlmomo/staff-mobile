<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>beautyql staff mobile</title>
  <style>
    :root{
      --bg:#f7f3ec;
      --card:#ffffff;
      --text:#2f261d;
      --sub:#7b6a58;
      --line:#e7dccd;
      --accent:#b98a2f;
      --accent-dark:#8f6a22;
      --danger:#c84c4c;
      --danger-bg:#fff1f1;
      --ok:#2f8f57;
      --ok-bg:#eef9f1;
      --shadow:0 8px 24px rgba(63,42,14,.08);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    }
    button,input,select{font:inherit}
    .page{
      width:100%;
      max-width:720px;
      margin:0 auto;
      min-height:100vh;
      padding:14px 14px 28px;
    }
    .top-card,.calendar-card,.list-card,.day-header,.empty,.job-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
    }
    .top-card,.calendar-card,.list-card,.day-header{padding:14px}
    .top-card{margin-bottom:14px}
    .calendar-card,.list-card,.day-header{margin-bottom:14px}
    .title-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .title{
      font-size:22px;
      font-weight:800;
      margin:0 0 4px;
    }
    .sub{
      color:var(--sub);
      font-size:13px;
      line-height:1.5;
      margin:0;
    }
    .staff-pill{
      background:#f7f1e7;
      color:var(--accent-dark);
      border:1px solid #ead9bd;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }
    .summary{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }
    .summary-card{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:12px;
      min-height:78px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .summary-label{
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
      font-weight:700;
    }
    .summary-value{
      font-size:24px;
      font-weight:800;
      line-height:1;
    }
    .danger .summary-value,.danger .summary-label{color:var(--danger)}
    .ok .summary-value,.ok .summary-label{color:var(--ok)}
    .toolbar{
      display:flex;
      gap:8px;
      align-items:center;
      margin-top:12px;
      flex-wrap:wrap;
    }
    .toolbar select{
      height:42px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 12px;
      color:var(--text);
      flex:1 1 220px;
    }
    .toolbar .month-nav{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .toolbar .month-btn{
      width:42px;
      height:42px;
      border:none;
      border-radius:12px;
      background:#2f261d;
      color:#fff;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
    }
    .month-label{
      min-width:130px;
      text-align:center;
      font-weight:800;
      color:var(--text);
    }
    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:12px;
    }
    .section-title{
      font-size:16px;
      font-weight:800;
      margin:0;
    }
    .section-note{
      font-size:12px;
      color:var(--sub);
      margin:0;
    }
    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
    }
    .weekday{
      text-align:center;
      font-size:12px;
      color:var(--sub);
      font-weight:700;
      padding:6px 0;
    }
    .day{
      aspect-ratio:1/1;
      min-height:48px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      cursor:pointer;
      position:relative;
      padding:4px;
    }
    .day.other{
      opacity:.32;
      background:#faf8f4;
      cursor:default;
    }
    .day.has-job{
      background:#fff3f3;
      border-color:#f0b6b6;
    }
    .day.selected{
      outline:2px solid var(--accent);
      outline-offset:1px;
    }
    .day.today::after{
      content:"";
      position:absolute;
      bottom:6px;
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--accent);
    }
    .day-num{
      font-weight:800;
      font-size:15px;
      line-height:1;
    }
    .day-count{
      font-size:10px;
      margin-top:4px;
      color:var(--sub);
      line-height:1;
      font-weight:700;
    }
    .day-header{
      padding:16px;
    }
    .day-title{
      margin:0 0 6px;
      font-size:22px;
      font-weight:800;
    }
    .day-meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .meta-chip{
      background:#f7f1e7;
      border:1px solid #ead9bd;
      color:var(--accent-dark);
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
    }
    .job-card{
      padding:14px;
      margin-bottom:12px;
      box-shadow:0 4px 14px rgba(63,42,14,.05);
    }
    .job-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .route-badge{
      min-width:52px;
      height:34px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#2f261d;
      color:#fff;
      font-weight:800;
      font-size:14px;
    }
    .name-block{
      flex:1;
      min-width:0;
    }
    .customer-name{
      margin:0;
      font-size:18px;
      font-weight:800;
      word-break:break-word;
    }
    .time-text{
      margin-top:4px;
      color:var(--sub);
      font-size:13px;
      font-weight:700;
    }
    .status-pill{
      white-space:nowrap;
      border-radius:999px;
      padding:8px 10px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--line);
      background:#faf8f4;
      color:var(--sub);
    }
    .status-pill.warn{
      background:var(--danger-bg);
      color:var(--danger);
      border-color:#f0b6b6;
    }
    .status-pill.ok{
      background:var(--ok-bg);
      color:var(--ok);
      border-color:#bfe1cb;
    }
    .info-list{
      display:grid;
      gap:8px;
      margin-bottom:12px;
    }
    .info-item{
      display:flex;
      gap:10px;
      align-items:flex-start;
      background:#faf8f4;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
    }
    .info-label{
      min-width:54px;
      color:var(--sub);
      font-size:12px;
      font-weight:800;
      padding-top:1px;
    }
    .info-value{
      flex:1;
      font-size:14px;
      font-weight:700;
      word-break:break-word;
      line-height:1.5;
    }
    .phone-link{
      color:#195cc1;
      text-decoration:underline;
    }
    .action-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }
    .action-btn{
      min-height:46px;
      border:none;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 4px 12px rgba(63,42,14,.06);
    }
    .primary{
      background:#2f261d;
      color:#fff;
    }
    .secondary{
      background:#f0e4ce;
      color:#6c4e18;
    }
    .empty{
      padding:24px 14px;
      text-align:center;
      color:var(--sub);
      background:#fbfaf7;
      border:1px dashed var(--line);
      border-radius:16px;
    }
    .loading,.error-box{
      padding:14px;
      border-radius:14px;
      margin-bottom:14px;
      font-weight:700;
    }
    .loading{
      background:#fffaf0;
      border:1px solid #ecd7a5;
      color:#8f6a22;
    }
    .error-box{
      background:var(--danger-bg);
      border:1px solid #f0b6b6;
      color:var(--danger);
      white-space:pre-wrap;
      line-height:1.6;
    }
    @media (max-width:480px){
      .title{font-size:20px}
      .summary-value{font-size:20px}
      .customer-name{font-size:17px}
      .day{min-height:46px}
      .action-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="loadingBox" class="loading">読込中...</div>
    <div id="errorBox" class="error-box" style="display:none;"></div>

    <div class="top-card">
      <div class="title-row">
        <div>
          <h1 class="title">beautyql staff mobile</h1>
          <p class="sub">スタッフ別の予約をカレンダー表示します</p>
        </div>
        <div class="staff-pill" id="staffPill">全件表示</div>
      </div>

      <div class="summary">
        <div class="summary-card">
          <div class="summary-label">今月件数</div>
          <div class="summary-value" id="summaryMonth">0</div>
        </div>
        <div class="summary-card danger">
          <div class="summary-label">3日前未確認</div>
          <div class="summary-value" id="summaryUnchecked">0</div>
        </div>
        <div class="summary-card ok">
          <div class="summary-label">今日件数</div>
          <div class="summary-value" id="summaryToday">0</div>
        </div>
      </div>

      <div class="toolbar">
        <select id="staffSelect"></select>
        <div class="month-nav">
          <button id="prevMonthBtn" class="month-btn" type="button">‹</button>
          <div id="monthLabel" class="month-label"></div>
          <button id="nextMonthBtn" class="month-btn" type="button">›</button>
        </div>
      </div>
    </div>

    <div class="calendar-card">
      <div class="section-head">
        <h2 class="section-title">カレンダー</h2>
        <p class="section-note">赤い日は予約あり</p>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="day-header">
      <h2 class="day-title" id="dayTitle">日付を選択してください</h2>
      <div class="day-meta">
        <div class="meta-chip" id="dayCountChip">0件</div>
        <div class="meta-chip" id="dayStaffChip">全件表示</div>
      </div>
    </div>

    <div class="list-card">
      <div class="section-head">
        <h2 class="section-title">当日の予約</h2>
        <p class="section-note">訪問順に表示</p>
      </div>
      <div id="jobsWrap"></div>
    </div>
  </div>

  <script>
    const WEEKDAYS = ["日","月","火","水","木","金","土"];

    const state = {
      raw: [],
      normalized: [],
      staffList: [],
      selectedStaff: "",
      selectedDate: "",
      viewDate: new Date(),
      eventsBound: false
    };

    const $ = (id) => document.getElementById(id);

    function escapeHtml(v){
      return String(v ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function ymd(date){
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2,"0");
      const d = String(date.getDate()).padStart(2,"0");
      return `${y}-${m}-${d}`;
    }

    function normalizeDate(value){
      if(value == null) return "";

      if(typeof value === "string"){
        const s = value.trim();
        if(!s) return "";

        const m1 = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
        if(m1){
          return `${m1[1]}-${String(m1[2]).padStart(2,"0")}-${String(m1[3]).padStart(2,"0")}`;
        }

        const m2 = s.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日$/);
        if(m2){
          return `${m2[1]}-${String(m2[2]).padStart(2,"0")}-${String(m2[3]).padStart(2,"0")}`;
        }

        const dt = new Date(s);
        if(!Number.isNaN(dt.getTime())){
          return ymd(dt);
        }
      }

      return "";
    }

    function parseYmd(value){
      const s = normalizeDate(value);
      if(!s) return null;
      const [y,m,d] = s.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function normalizeTime(value){
      if(value == null) return "";

      if(typeof value === "string"){
        const s = value.trim();
        if(!s) return "";

        const m = s.match(/^(\d{1,2}):(\d{1,2})/);
        if(m){
          return `${String(m[1]).padStart(2,"0")}:${String(m[2]).padStart(2,"0")}`;
        }

        const m2 = s.match(/^(\d{1,2})時(\d{1,2})?分?$/);
        if(m2){
          return `${String(m2[1]).padStart(2,"0")}:${String(m2[2] || "0").padStart(2,"0")}`;
        }

        const dt = new Date(s);
        if(!Number.isNaN(dt.getTime())){
          return `${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
        }

        return s;
      }

      return "";
    }

    function pick(obj, keys){
      for(const key of keys){
        if(obj && obj[key] != null && String(obj[key]).trim() !== ""){
          return obj[key];
        }
      }
      return "";
    }

    function normalizeStaffValue(v){
      return String(v ?? "").trim();
    }

    function toNumber(v, fallback = 9999){
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function formatJapaneseDate(value){
      const dt = parseYmd(value);
      if(!dt) return "";
      return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日（${WEEKDAYS[dt.getDay()]}）`;
    }

    function monthLabel(date){
      return `${date.getFullYear()}年${date.getMonth()+1}月`;
    }

    function getToday(){
      return ymd(new Date());
    }

    function isWithinUpcomingThreeDays(dateStr){
      const dt = parseYmd(dateStr);
      if(!dt) return false;
      const today = new Date();
      today.setHours(0,0,0,0);
      const target = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
      const diff = Math.floor((target.getTime() - today.getTime()) / 86400000);
      return diff >= 0 && diff <= 3;
    }

    function isChecked(item){
      return Boolean(
        item.time_contact_checked === true ||
        item.timeContactChecked === true ||
        item.staff_mobile_time_contact_checked === true ||
        String(item.time_contact_checked).toLowerCase() === "true" ||
        String(item.timeContactChecked).toLowerCase() === "true" ||
        String(item.staff_mobile_time_contact_checked).toLowerCase() === "true" ||
        String(item.time_contact_checked) === "1" ||
        String(item.timeContactChecked) === "1" ||
        String(item.staff_mobile_time_contact_checked) === "1"
      );
    }

    function normalizeReservation(obj, index){
      const staffRaw = pick(obj, [
        "staff","staffName","staff_name","staff_id","staffId","担当","担当者"
      ]);

      const routeRaw = pick(obj, [
        "visitOrder","visit_order","route_order","routeOrder","order","sort","sort_order"
      ]);

      const checked = isChecked(obj);

      return {
        id: String(pick(obj, ["reservationId","reservation_id","id","ID"])).trim() || String(index + 1),
        customerId: String(pick(obj, ["customerId","customer_id","customerID"])).trim(),
        name: String(pick(obj, ["name","customerName","customer_name","利用者氏名","利用者名"])).trim() || "利用者名未設定",
        address: String(pick(obj, ["address","customerAddress","住所"])).trim() || "住所未登録",
        phone: String(pick(obj, ["phone","tel","telephone","customerPhone","電話番号"])).trim() || "",
        date: normalizeDate(pick(obj, ["date","reservation_date","reservationDate","visit_date","visitDate","day"])),
        time: normalizeTime(pick(obj, ["time","visit_time","visitTime","reservation_time","reservationTime","start_time","startTime"])),
        staff: normalizeStaffValue(staffRaw),
        status: String(pick(obj, ["status","状態"])).trim() || "予約済",
        menu: String(pick(obj, ["menu","service","施術内容"])).trim() || "施術内容未設定",
        route: toNumber(routeRaw, index + 1),
        checked: checked,
        raw: obj
      };
    }

    function getStaffFromQuery(){
      const qp = new URLSearchParams(location.search);
      return normalizeStaffValue(qp.get("staff") || qp.get("staff_id") || qp.get("name"));
    }

    function buildStaffList(list){
      const set = new Set();
      list.forEach(item => {
        if(item.staff && item.staff !== "管理者"){
          set.add(item.staff);
        }
      });
      return [...set].sort((a,b) => a.localeCompare(b, "ja"));
    }

    function getFilteredReservations(){
      return state.normalized
        .filter(item => item.date)
        .filter(item => !state.selectedStaff || item.staff === state.selectedStaff);
    }

    function getReservationsByDate(dateStr){
      return getFilteredReservations()
        .filter(item => item.date === dateStr)
        .sort((a,b) => {
          if(a.route !== b.route) return a.route - b.route;
          return String(a.time).localeCompare(String(b.time), "ja");
        });
    }

    function countMonthReservations(){
      const year = state.viewDate.getFullYear();
      const month = state.viewDate.getMonth();
      return getFilteredReservations().filter(item => {
        const dt = parseYmd(item.date);
        return dt && dt.getFullYear() === year && dt.getMonth() === month;
      }).length;
    }

    function countUncheckedWithin3Days(){
      return getFilteredReservations().filter(item => {
        if(item.checked) return false;
        if(!item.date) return false;
        return isWithinUpcomingThreeDays(item.date);
      }).length;
    }

    function countTodayReservations(){
      const today = getToday();
      return getFilteredReservations().filter(item => item.date === today).length;
    }

    function renderSummary(){
      $("summaryMonth").textContent = String(countMonthReservations());
      $("summaryUnchecked").textContent = String(countUncheckedWithin3Days());
      $("summaryToday").textContent = String(countTodayReservations());
    }

    function renderStaffSelect(){
      const select = $("staffSelect");
      const current = state.selectedStaff;
      const hasStaff = state.staffList.length > 0;

      const options = hasStaff
        ? [`<option value="">全件表示</option>`].concat(
            state.staffList.map(name => {
              const selected = name === current ? " selected" : "";
              return `<option value="${escapeHtml(name)}"${selected}>${escapeHtml(name)}</option>`;
            })
          )
        : [`<option value="">全件表示</option>`];

      select.innerHTML = options.join("");

      const label = current || "全件表示";
      $("staffPill").textContent = label;
      $("dayStaffChip").textContent = label;
    }

    function renderCalendar(){
      $("monthLabel").textContent = monthLabel(state.viewDate);

      const grid = $("calendarGrid");
      const year = state.viewDate.getFullYear();
      const month = state.viewDate.getMonth();

      const first = new Date(year, month, 1);
      const startDay = first.getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevMonthLast = new Date(year, month, 0).getDate();
      const selected = state.selectedDate;
      const today = getToday();

      const counts = {};
      getFilteredReservations().forEach(item => {
        counts[item.date] = (counts[item.date] || 0) + 1;
      });

      let html = "";
      WEEKDAYS.forEach(w => {
        html += `<div class="weekday">${w}</div>`;
      });

      for(let i = 0; i < startDay; i++){
        const d = prevMonthLast - startDay + i + 1;
        html += `<div class="day other"><div class="day-num">${d}</div></div>`;
      }

      for(let d = 1; d <= daysInMonth; d++){
        const dateStr = `${year}-${String(month + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const count = counts[dateStr] || 0;
        const classes = ["day"];
        if(count > 0) classes.push("has-job");
        if(dateStr === selected) classes.push("selected");
        if(dateStr === today) classes.push("today");

        html += `
          <button class="${classes.join(" ")}" type="button" data-date="${dateStr}">
            <div class="day-num">${d}</div>
            <div class="day-count">${count > 0 ? count + "件" : ""}</div>
          </button>
        `;
      }

      grid.innerHTML = html;

      [...grid.querySelectorAll(".day[data-date]")].forEach(btn => {
        btn.addEventListener("click", () => {
          const date = btn.getAttribute("data-date");
          if(!date) return;
          state.selectedDate = date;
          renderCalendar();
          renderDay();
        });
      });
    }

    function renderDay(){
      const dateStr = state.selectedDate;
      const wrap = $("jobsWrap");

      if(!dateStr){
        $("dayTitle").textContent = "日付を選択してください";
        $("dayCountChip").textContent = "0件";
        wrap.innerHTML = `<div class="empty">カレンダーから日付を選んでください</div>`;
        return;
      }

      const list = getReservationsByDate(dateStr);
      $("dayTitle").textContent = formatJapaneseDate(dateStr) || dateStr;
      $("dayCountChip").textContent = `${list.length}件`;

      if(list.length === 0){
        wrap.innerHTML = `<div class="empty">この日の予約はありません</div>`;
        return;
      }

      wrap.innerHTML = list.map((item, idx) => {
        const warn = isWithinUpcomingThreeDays(item.date) && !item.checked;
        const statusClass = warn ? "warn" : "ok";
        const statusText = warn ? "3日前未確認" : "確認済 / 通常";
        const googleMapUrl = item.address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.address)}` : "";
        const telUrl = item.phone ? `tel:${item.phone.replace(/[^0-9+]/g,"")}` : "";

        return `
          <div class="job-card">
            <div class="job-top">
              <div class="route-badge">${escapeHtml(String(item.route || (idx + 1)))}番</div>
              <div class="name-block">
                <h3 class="customer-name">${escapeHtml(item.name)}</h3>
                <div class="time-text">${escapeHtml(item.time || "時間未設定")} / ${escapeHtml(item.menu || "施術内容未設定")}</div>
              </div>
              <div class="status-pill ${statusClass}">${statusText}</div>
            </div>

            <div class="info-list">
              <div class="info-item">
                <div class="info-label">住所</div>
                <div class="info-value">${escapeHtml(item.address || "住所未登録")}</div>
              </div>
              <div class="info-item">
                <div class="info-label">電話</div>
                <div class="info-value">
                  ${item.phone ? `<a class="phone-link" href="${escapeHtml(telUrl)}">${escapeHtml(item.phone)}</a>` : "電話番号未登録"}
                </div>
              </div>
              <div class="info-item">
                <div class="info-label">状態</div>
                <div class="info-value">${escapeHtml(item.status || "予約済")}</div>
              </div>
            </div>

            <div class="action-row">
              <button class="action-btn secondary" type="button" data-copy="${escapeHtml(item.address)}">住所コピー</button>
              <button class="action-btn primary" type="button" data-map="${escapeHtml(googleMapUrl)}">地図を開く</button>
            </div>
          </div>
        `;
      }).join("");

      wrap.querySelectorAll("[data-copy]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const text = btn.getAttribute("data-copy") || "";
          await copyAddress(text);
        });
      });

      wrap.querySelectorAll("[data-map]").forEach(btn => {
        btn.addEventListener("click", () => {
          const url = btn.getAttribute("data-map") || "";
          openMap(url);
        });
      });
    }

    function openMap(url){
      if(!url){
        alert("住所がありません");
        return;
      }
      window.open(url, "_blank");
    }

    async function copyAddress(text){
      const value = String(text || "").trim();
      if(!value){
        alert("住所がありません");
        return;
      }
      try{
        await navigator.clipboard.writeText(value);
        alert("住所をコピーしました");
      }catch(e){
        alert("コピーできませんでした");
      }
    }

    function ensureSelectedDate(){
      const filtered = getFilteredReservations();
      const today = getToday();

      if(state.selectedDate) return;

      if(filtered.some(item => item.date === today)){
        state.selectedDate = today;
        return;
      }

      const dates = [...new Set(filtered.map(item => item.date))].sort();
      const upcoming = dates.find(date => date >= today);

      if(upcoming){
        state.selectedDate = upcoming;
        return;
      }

      state.selectedDate = dates[dates.length - 1] || today;
    }

    function applyInitialStaff(){
      const queryStaff = getStaffFromQuery();
      if(queryStaff && state.staffList.includes(queryStaff)){
        state.selectedStaff = queryStaff;
      }else{
        state.selectedStaff = "";
      }
    }

    async function fetchApi(){
      const res = await fetch("https://script.google.com/macros/s/AKfycbxNmHMwmRle_qcRkwp6rmPHfuB5QqUg5Ks-5UuGjIJJNQekbMd4NPymsFnJn9VYUyn3Dww/exec?t=" + Date.now(), {
        method:"GET",
        headers:{ "Accept":"application/json" }
      });

      if(!res.ok){
        throw new Error(`API取得失敗: ${res.status} ${res.statusText}`);
      }

      const data = await res.json();

      if(!Array.isArray(data)){
        throw new Error("APIの返却が配列ではありません。");
      }

      return data;
    }

    function bindEvents(){
      if(state.eventsBound) return;
      state.eventsBound = true;

      $("staffSelect").addEventListener("change", (e) => {
        state.selectedStaff = e.target.value;
        state.selectedDate = "";
        ensureSelectedDate();
        renderAll();
      });

      $("prevMonthBtn").addEventListener("click", () => {
        state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() - 1, 1);
        renderSummary();
        renderCalendar();
      });

      $("nextMonthBtn").addEventListener("click", () => {
        state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() + 1, 1);
        renderSummary();
        renderCalendar();
      });
    }

    function renderAll(){
      renderStaffSelect();
      renderSummary();
      renderCalendar();
      renderDay();
    }

    async function init(){
      try{
        const data = await fetchApi();

        state.raw = data;
        state.normalized = data.map((item, index) => normalizeReservation(item, index)).filter(item => item.date);
        state.staffList = buildStaffList(state.normalized);
        applyInitialStaff();
        ensureSelectedDate();
        bindEvents();
        renderAll();

        $("loadingBox").style.display = "none";
      }catch(err){
        $("loadingBox").style.display = "none";
        $("errorBox").style.display = "block";
        $("errorBox").textContent = String(err.message || err);
      }
    }

    init();
  </script>
</body>
</html>
