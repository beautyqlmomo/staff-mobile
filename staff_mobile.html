<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>beautyql staff mobile</title>
  <style>
    :root{
      --bg:#f7f3ec;
      --card:#ffffff;
      --text:#2f261d;
      --sub:#7b6a58;
      --line:#e7dccd;
      --accent:#b98a2f;
      --accent-dark:#8f6a22;
      --danger:#c84c4c;
      --danger-bg:#fff1f1;
      --ok:#2f8f57;
      --ok-bg:#eef9f1;
      --shadow:0 8px 24px rgba(63,42,14,.08);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    }
    button,input,select,textarea{font:inherit}
    a{text-decoration:none;color:inherit}
    .page{
      width:100%;
      max-width:720px;
      margin:0 auto;
      min-height:100vh;
      padding:72px 14px 28px;
    }
    .back-btn{
      position:fixed;
      top:12px;
      left:12px;
      z-index:1000;
      min-width:92px;
      height:44px;
      border:none;
      border-radius:12px;
      background:#2f261d;
      color:#fff;
      font-weight:700;
      box-shadow:var(--shadow);
      cursor:pointer;
    }
    .top-card,.calendar-card,.day-header,.list-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:14px;
    }
    .title-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .title{
      font-size:22px;
      font-weight:800;
      margin:0 0 4px;
    }
    .sub{
      color:var(--sub);
      font-size:13px;
      line-height:1.5;
      margin:0;
    }
    .staff-pill{
      background:#f7f1e7;
      color:var(--accent-dark);
      border:1px solid #ead9bd;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }
    .summary{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:12px;
    }
    .summary-card{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:12px;
      min-height:78px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .summary-label{
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
      font-weight:700;
    }
    .summary-value{
      font-size:24px;
      font-weight:800;
      line-height:1;
    }
    .danger .summary-value,.danger .summary-label{color:var(--danger)}
    .ok .summary-value,.ok .summary-label{color:var(--ok)}
    .toolbar{
      display:flex;
      gap:8px;
      align-items:center;
      margin-top:12px;
      flex-wrap:wrap;
    }
    .toolbar select{
      height:42px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 12px;
      color:var(--text);
      flex:1 1 220px;
    }
    .month-nav{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .month-btn{
      width:42px;
      height:42px;
      border:none;
      border-radius:12px;
      background:#2f261d;
      color:#fff;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
    }
    .month-label{
      min-width:130px;
      text-align:center;
      font-weight:800;
      color:var(--text);
    }
    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:12px;
    }
    .section-title{
      font-size:16px;
      font-weight:800;
      margin:0;
    }
    .section-note{
      font-size:12px;
      color:var(--sub);
      margin:0;
    }
    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
    }
    .weekday{
      text-align:center;
      font-size:12px;
      color:var(--sub);
      font-weight:700;
      padding:6px 0;
    }
    .day{
      aspect-ratio:1/1;
      min-height:48px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      cursor:pointer;
      position:relative;
      padding:4px;
    }
    .day.empty{
      background:#faf8f4;
      opacity:.4;
      cursor:default;
    }
    .day.has-job{
      background:#fff3f3;
      border-color:#f0b6b6;
    }
    .day.selected{
      outline:2px solid var(--accent);
      outline-offset:1px;
    }
    .day.today::after{
      content:"";
      position:absolute;
      bottom:6px;
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--accent);
    }
    .day-num{
      font-weight:800;
      font-size:15px;
      line-height:1;
    }
    .day-count{
      font-size:10px;
      margin-top:4px;
      color:var(--sub);
      line-height:1;
      font-weight:700;
    }
    .day-title{
      margin:0 0 6px;
      font-size:22px;
      font-weight:800;
    }
    .day-meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .meta-chip{
      background:#f7f1e7;
      border:1px solid #ead9bd;
      color:var(--accent-dark);
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
    }
    .job-card{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:14px;
      margin-bottom:12px;
      box-shadow:0 4px 14px rgba(63,42,14,.05);
    }
    .job-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .route-badge{
      min-width:52px;
      height:34px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#2f261d;
      color:#fff;
      font-weight:800;
      font-size:14px;
    }
    .name-block{
      flex:1;
      min-width:0;
    }
    .customer-name{
      margin:0;
      font-size:18px;
      font-weight:800;
      word-break:break-word;
    }
    .time-text{
      margin-top:4px;
      color:var(--sub);
      font-size:13px;
      font-weight:700;
    }
    .status-pill{
      white-space:nowrap;
      border-radius:999px;
      padding:8px 10px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--line);
      background:#faf8f4;
      color:var(--sub);
    }
    .status-pill.warn{
      background:var(--danger-bg);
      color:var(--danger);
      border-color:#f0b6b6;
    }
    .status-pill.ok{
      background:var(--ok-bg);
      color:var(--ok);
      border-color:#bfe1cb;
    }
    .info-list{
      display:grid;
      gap:8px;
      margin-bottom:12px;
    }
    .info-item{
      display:flex;
      gap:10px;
      align-items:flex-start;
      background:#faf8f4;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
    }
    .info-label{
      min-width:54px;
      color:var(--sub);
      font-size:12px;
      font-weight:800;
      padding-top:1px;
    }
    .info-value{
      flex:1;
      font-size:14px;
      font-weight:700;
      word-break:break-word;
      line-height:1.5;
    }
    .phone-link{
      color:#195cc1;
      text-decoration:underline;
    }
    .check-wrap{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:#faf8f4;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-top:8px;
    }
    .check-left{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }
    .check-title{
      font-size:14px;
      font-weight:800;
      margin:0;
    }
    .check-desc{
      font-size:12px;
      color:var(--sub);
      margin:0;
      line-height:1.4;
    }
    .toggle{
      position:relative;
      width:58px;
      height:34px;
      flex:0 0 auto;
    }
    .toggle input{display:none}
    .slider{
      position:absolute;
      inset:0;
      background:#d9cec0;
      border-radius:999px;
      transition:.2s;
      cursor:pointer;
    }
    .slider::before{
      content:"";
      position:absolute;
      width:26px;
      height:26px;
      left:4px;
      top:4px;
      border-radius:50%;
      background:#fff;
      transition:.2s;
      box-shadow:0 2px 6px rgba(0,0,0,.18);
    }
    .toggle input:checked + .slider{
      background:var(--ok);
    }
    .toggle input:checked + .slider::before{
      transform:translateX(24px);
    }
    .empty{
      padding:24px 14px;
      text-align:center;
      color:var(--sub);
      background:#fbfaf7;
      border:1px dashed var(--line);
      border-radius:16px;
    }
    .error-box{
      background:#fff1f1;
      color:#b42318;
      border:1px solid #f0b6b6;
      border-radius:16px;
      padding:14px;
      font-weight:700;
      line-height:1.6;
      margin-bottom:14px;
      display:none;
      white-space:pre-line;
    }
    @media (max-width:420px){
      .summary{grid-template-columns:1fr 1fr 1fr}
      .summary-value{font-size:21px}
      .customer-name{font-size:17px}
      .route-badge{min-width:48px}
      .month-label{min-width:110px}
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">← 戻る</button>

  <div class="page">
    <section class="top-card">
      <div class="title-row">
        <div>
          <h1 class="title">スタッフ画面</h1>
          <p class="sub">カレンダーで仕事日を確認し、対象日を開いて利用者情報と時間連絡状況を確認します。</p>
        </div>
        <div id="staffPill" class="staff-pill">スタッフ未設定</div>
      </div>

      <div class="summary">
        <div class="summary-card">
          <div class="summary-label">今月の仕事日</div>
          <div id="monthWorkDays" class="summary-value">0</div>
        </div>
        <div class="summary-card danger">
          <div class="summary-label">選択日の件数</div>
          <div id="selectedCount" class="summary-value">0</div>
        </div>
        <div class="summary-card ok">
          <div class="summary-label">時間連絡済</div>
          <div id="checkedCount" class="summary-value">0</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="month-nav">
          <button class="month-btn" id="prevMonthBtn" type="button">‹</button>
          <div id="monthLabel" class="month-label">----</div>
          <button class="month-btn" id="nextMonthBtn" type="button">›</button>
        </div>
        <select id="staffSelect"></select>
      </div>
    </section>

    <div id="errorBox" class="error-box"></div>

    <section class="calendar-card">
      <div class="section-head">
        <div>
          <h2 class="section-title">仕事日カレンダー</h2>
          <p class="section-note">色が付いている日が仕事日です。タップするとその日の利用者一覧を表示します。</p>
        </div>
      </div>
      <div class="calendar-grid" id="weekdayRow"></div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </section>

    <section class="day-header" id="dayHeader">
      <h2 class="day-title" id="selectedDateTitle">日付を選択してください</h2>
      <div class="day-meta">
        <div class="meta-chip" id="selectedDateCount">利用者 0名</div>
        <div class="meta-chip" id="selectedDateChecked">時間連絡済 0件</div>
      </div>
    </section>

    <section class="list-card">
      <div class="section-head">
        <div>
          <h2 class="section-title">訪問順・利用者一覧</h2>
          <p class="section-note">時間が未確定でも表示されます。3日前確認の記録だけこの画面で保存できます。</p>
        </div>
      </div>
      <div id="jobsWrap"></div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxNmHMwmRle_qcRkwp6rmPHfuB5QqUg5Ks-5UuGjIJNQekbMd4NPymsFnJn9VYUn3Dww/exec";

    const WEEKDAYS = ["日","月","火","水","木","金","土"];
    const STORAGE_KEYS = {
      reservations: "beautyql_reservations"
    };

    const state = {
      reservations: [],
      monthCursor: firstDayOfMonth(new Date()),
      selectedDate: todayYmd(),
      currentStaff: ""
    };

    function todayYmd() {
      return formatYmd(new Date());
    }

    function formatYmd(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function parseYmd(ymd) {
      if (!ymd) return null;
      const s = normalizeDate(ymd);
      if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) return null;
      const [y, m, d] = s.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function firstDayOfMonth(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function getMonthLabel(date) {
      return `${date.getFullYear()}年${date.getMonth() + 1}月`;
    }

    function getJapaneseDateLabel(ymd) {
      const dt = parseYmd(ymd);
      if (!dt) return ymd || "";
      return `${dt.getFullYear()}年${dt.getMonth() + 1}月${dt.getDate()}日（${WEEKDAYS[dt.getDay()]}）`;
    }

    function escapeHtml(v) {
      return String(v ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeDate(value) {
      if (!value) return "";
      if (Object.prototype.toString.call(value) === "[object Date]" && !Number.isNaN(value.getTime())) {
        return formatYmd(value);
      }
      const s = String(value).trim();

      let m = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
      if (m) {
        return `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
      }

      m = s.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日$/);
      if (m) {
        return `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
      }

      const d = new Date(s);
      if (!Number.isNaN(d.getTime())) {
        return formatYmd(d);
      }

      return "";
    }

    function normalizeTime(value) {
      if (!value) return "";
      const s = String(value).trim();
      const m = s.match(/^(\d{1,2}):(\d{1,2})/);
      if (m) {
        return `${String(m[1]).padStart(2,"0")}:${String(m[2]).padStart(2,"0")}`;
      }
      return s;
    }

    function readStaffFromQuery() {
      const qp = new URLSearchParams(location.search);
      return (qp.get("staff") || qp.get("staff_id") || "").trim();
    }

    function normalizeRow(raw) {
      const customerName = String(
        raw.customerName ??
        raw.customer_name ??
        raw.name ??
        raw.利用者氏名 ??
        raw.氏名 ??
        ""
      ).trim();

      const address = String(
        raw.address ??
        raw.customerAddress ??
        raw.住所 ??
        ""
      ).trim();

      const phone = String(
        raw.phone ??
        raw.tel ??
        raw.customerPhone ??
        raw.電話番号 ??
        ""
      ).trim();

      const staff = String(
        raw.staff ??
        raw.staffName ??
        raw.担当者 ??
        raw.スタッフ ??
        ""
      ).trim();

      const date = normalizeDate(
        raw.date ??
        raw.visitDate ??
        raw.reservationDate ??
        raw.予約日 ??
        raw.訪問日 ??
        ""
      );

      const time = normalizeTime(
        raw.time ??
        raw.visitTime ??
        raw.reservationTime ??
        raw.予約時間 ??
        raw.訪問時間 ??
        ""
      );

      const routeOrderRaw =
        raw.routeOrder ??
        raw.route_order ??
        raw.visitOrder ??
        raw.visit_order ??
        raw.order ??
        raw.順番 ??
        raw.訪問順;

      const routeOrder = Number.isFinite(Number(routeOrderRaw)) ? Number(routeOrderRaw) : 9999;

      const status = String(raw.status ?? raw.状態 ?? "予約済").trim();

      const checked =
        raw.timeConfirmed === true ||
        raw.timeConfirmed === "true" ||
        raw.timeConfirmed === 1 ||
        raw.timeChecked === true ||
        raw.timeChecked === "true" ||
        raw.timeChecked === 1 ||
        raw.contactChecked === true ||
        raw.contactChecked === "true" ||
        raw.contactChecked === 1 ||
        raw.precheckDone === true ||
        raw.precheckDone === "true" ||
        raw.precheckDone === 1;

      return {
        id: String(raw.id ?? raw.ID ?? `${date}_${staff}_${customerName}_${time}`).trim(),
        customerName,
        address,
        phone,
        staff,
        date,
        time,
        routeOrder,
        status,
        checked,
        raw
      };
    }

    function normalizeApiData(payload) {
      if (Array.isArray(payload)) {
        if (payload.length > 0 && Array.isArray(payload[0])) {
          const headers = payload[0].map(h => String(h || "").trim());
          return payload.slice(1)
            .filter(row => Array.isArray(row))
            .map(row => {
              const obj = {};
              headers.forEach((h, i) => {
                if (!h) return;
                obj[h] = row[i];
              });
              return obj;
            });
        }
        return payload;
      }

      if (payload && Array.isArray(payload.data)) {
        return payload.data;
      }

      return [];
    }

    function showError(message) {
      const box = document.getElementById("errorBox");
      box.style.display = "block";
      box.textContent = message;
    }

    function hideError() {
      const box = document.getElementById("errorBox");
      box.style.display = "none";
      box.textContent = "";
    }

    async function fetchReservations() {
      try {
        const url = API_URL + (API_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
        const res = await fetch(url, { method: "GET", cache: "no-store" });

        if (!res.ok) {
          throw new Error("GASの取得に失敗しました HTTP " + res.status);
        }

        const payload = await res.json();
        const arr = normalizeApiData(payload);

        return arr.map(normalizeRow).filter(r => r.date);
      } catch (error) {
        throw new Error(error.message || "Failed to fetch");
      }
    }

    function saveLocalReservations(list) {
      localStorage.setItem(STORAGE_KEYS.reservations, JSON.stringify(list));
    }

    function loadLocalReservations() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.reservations);
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      } catch (e) {
        return [];
      }
    }

    function getStaffList() {
      const names = [...new Set(
        state.reservations
          .map(r => String(r.staff || "").trim())
          .filter(Boolean)
          .filter(v => v !== "管理者")
      )].sort((a,b) => a.localeCompare(b, "ja"));

      return names;
    }

    function setupStaffSelect() {
      const select = document.getElementById("staffSelect");
      const staffs = getStaffList();
      const queryStaff = readStaffFromQuery();

      if (!state.currentStaff) {
        if (queryStaff && staffs.includes(queryStaff)) {
          state.currentStaff = queryStaff;
        } else {
          state.currentStaff = staffs[0] || "";
        }
      }

      select.innerHTML = staffs.map(name => {
        const selected = name === state.currentStaff ? "selected" : "";
        return `<option value="${escapeHtml(name)}" ${selected}>${escapeHtml(name)}</option>`;
      }).join("");

      select.onchange = () => {
        state.currentStaff = select.value;
        renderAll();
      };

      document.getElementById("staffPill").textContent = state.currentStaff || "スタッフ未設定";
    }

    function getVisibleReservations() {
      return state.reservations
        .filter(r => r.staff === state.currentStaff)
        .filter(r => !["キャンセル", "cancel", "canceled"].includes(String(r.status || "").toLowerCase()));
    }

    function getReservationsByDate(dateKey) {
      return getVisibleReservations()
        .filter(r => r.date === dateKey)
        .sort((a,b) => {
          if (a.routeOrder !== b.routeOrder) return a.routeOrder - b.routeOrder;
          if (a.time && b.time) return a.time.localeCompare(b.time);
          if (a.time) return -1;
          if (b.time) return 1;
          return a.customerName.localeCompare(b.customerName, "ja");
        });
    }

    function getMonthWorkDaysCount() {
      const y = state.monthCursor.getFullYear();
      const m = state.monthCursor.getMonth();
      const set = new Set(
        getVisibleReservations()
          .filter(r => {
            const dt = parseYmd(r.date);
            return dt && dt.getFullYear() === y && dt.getMonth() === m;
          })
          .map(r => r.date)
      );
      return set.size;
    }

    function renderWeekdays() {
      const row = document.getElementById("weekdayRow");
      row.innerHTML = WEEKDAYS.map(d => `<div class="weekday">${d}</div>`).join("");
    }

    function renderCalendar() {
      document.getElementById("monthLabel").textContent = getMonthLabel(state.monthCursor);
      document.getElementById("monthWorkDays").textContent = getMonthWorkDaysCount();

      const grid = document.getElementById("calendarGrid");
      grid.innerHTML = "";

      const first = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth(), 1);
      const last = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth() + 1, 0);
      const startBlank = first.getDay();
      const today = todayYmd();

      for (let i = 0; i < startBlank; i++) {
        const div = document.createElement("div");
        div.className = "day empty";
        grid.appendChild(div);
      }

      for (let day = 1; day <= last.getDate(); day++) {
        const dt = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth(), day);
        const key = formatYmd(dt);
        const count = getReservationsByDate(key).length;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "day";
        if (count > 0) btn.classList.add("has-job");
        if (key === state.selectedDate) btn.classList.add("selected");
        if (key === today) btn.classList.add("today");

        btn.innerHTML = `
          <div class="day-num">${day}</div>
          <div class="day-count">${count > 0 ? count + "件" : ""}</div>
        `;
        btn.onclick = () => {
          state.selectedDate = key;
          renderAll();
        };
        grid.appendChild(btn);
      }
    }

    function toggleChecked(id) {
      const index = state.reservations.findIndex(r => r.id === id);
      if (index === -1) return;
      state.reservations[index].checked = !state.reservations[index].checked;
      saveLocalReservations(state.reservations);
      renderAll();
    }

    function renderDay() {
      const list = getReservationsByDate(state.selectedDate);
      const wrap = document.getElementById("jobsWrap");

      document.getElementById("selectedDateTitle").textContent =
        state.selectedDate ? getJapaneseDateLabel(state.selectedDate) : "日付を選択してください";

      document.getElementById("selectedDateCount").textContent = `利用者 ${list.length}名`;
      document.getElementById("selectedDateChecked").textContent =
        `時間連絡済 ${list.filter(r => r.checked).length}件`;

      document.getElementById("selectedCount").textContent = String(list.length);
      document.getElementById("checkedCount").textContent = String(list.filter(r => r.checked).length);

      if (!list.length) {
        wrap.innerHTML = `<div class="empty">この日の予約はありません</div>`;
        return;
      }

      wrap.innerHTML = list.map((r, i) => {
        const statusClass = r.checked ? "ok" : "warn";
        const statusText = r.checked ? "時間連絡済" : "時間未確認";
        return `
          <div class="job-card">
            <div class="job-top">
              <div class="route-badge">${Number.isFinite(r.routeOrder) && r.routeOrder !== 9999 ? r.routeOrder : (i + 1)}</div>
              <div class="name-block">
                <h3 class="customer-name">${escapeHtml(r.customerName || "名称未設定")}</h3>
                <div class="time-text">${escapeHtml(r.time || "時間未定")}</div>
              </div>
              <div class="status-pill ${statusClass}">${statusText}</div>
            </div>

            <div class="info-list">
              <div class="info-item">
                <div class="info-label">住所</div>
                <div class="info-value">${escapeHtml(r.address || "未登録")}</div>
              </div>
              <div class="info-item">
                <div class="info-label">電話</div>
                <div class="info-value">
                  ${r.phone ? `<a class="phone-link" href="tel:${escapeHtml(r.phone)}">${escapeHtml(r.phone)}</a>` : "未登録"}
                </div>
              </div>
              <div class="info-item">
                <div class="info-label">状態</div>
                <div class="info-value">${escapeHtml(r.status || "予約済")}</div>
              </div>
            </div>

            <div class="check-wrap">
              <div class="check-left">
                <div class="check-title">3日前確認</div>
                <div class="check-desc">電話で時間連絡が終わったらON</div>
              </div>
              <label class="toggle">
                <input type="checkbox" ${r.checked ? "checked" : ""} onchange="toggleChecked('${escapeHtml(r.id)}')">
                <span class="slider"></span>
              </label>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderAll() {
      document.getElementById("staffPill").textContent = state.currentStaff || "スタッフ未設定";
      renderCalendar();
      renderDay();
    }

    async function init() {
      try {
        hideError();

        const apiRows = await fetchReservations();
        const localRows = loadLocalReservations();

        const checkedMap = new Map(
          localRows.map(r => [String(r.id), !!r.checked])
        );

        state.reservations = apiRows.map(r => ({
          ...r,
          checked: checkedMap.has(String(r.id)) ? checkedMap.get(String(r.id)) : !!r.checked
        }));

        saveLocalReservations(state.reservations);

        setupStaffSelect();

        const visible = getVisibleReservations();
        if (!visible.some(r => r.date === state.selectedDate)) {
          const firstDate = visible.map(r => r.date).sort()[0];
          if (firstDate) state.selectedDate = firstDate;
        }

        renderWeekdays();
        renderAll();

      } catch (error) {
        showError(
          "取得失敗：" + error.message + "\n\n" +
          "今のGASは動いています。\n" +
          "このHTMLを GitHub Pages で開いてください。\n" +
          "file:/// 直開きは使わないでください。"
        );
        console.error(error);
      }
    }

    document.getElementById("prevMonthBtn").onclick = () => {
      state.monthCursor = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth() - 1, 1);
      renderAll();
    };

    document.getElementById("nextMonthBtn").onclick = () => {
      state.monthCursor = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth() + 1, 1);
      renderAll();
    };

    window.toggleChecked = toggleChecked;
    init();
  </script>
</body>
</html>
